apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: azurefile
provisioner: kubernetes.io/azure-file
parameters:
  storageAccount: sa1sharedstorage
  secretName: azure-storage-secret
  shareName: quickscripts
reclaimPolicy: Retain
volumeBindingMode: Immediate
---
apiVersion: v1
kind: Secret
metadata:
  name: azure-storage-secret
type: Opaque
data:
  azurestorageaccountname: c2Exc2hhcmVkc3RvcmFnZQ==
  azurestorageaccountkey: eEw4RDVEZDhka0ZzOEJUZUc1TW5UaTlzN2lLR1ZsdEFpZ3lVVVMvWTYwaWpncmJLZ1JPOWtoMHZBZ3JXUXNiZUEzY25MYmk0eGJjQStBU3RNb3l1SGc9PQ==
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: azurefile-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: azurefile
  azureFile:
    secretName: azure-storage-secret
    shareName: quickscripts
    readOnly: false
  mountOptions:
    - dir_mode=0777
    - file_mode=0777
    - uid=1000
    - gid=1000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: azurefile-pvc
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: azurefile
  resources:
    requests:
      storage: 5Gi 